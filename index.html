<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 베지에 곡선 시뮬레이터 (Bézier Curve)</title>
    <style>
        body { 
            margin: 0; 
            background-color: #0b0f19; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info-panel {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(30, 41, 59, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            color: #e2e8f0; 
            pointer-events: auto;
            max-width: 320px;
        }
        h2 { color: #61dafb; margin: 0 0 10px 0; font-size: 20px; }
        p { color: #94a3b8; font-size: 13px; line-height: 1.5; margin: 0 0 15px 0; }
        .control-guide {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #cbd5e1;
        }
        .control-guide ul { margin: 5px 0 0 0; padding-left: 20px; }
        .highlight { color: #38bdf8; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="info-panel">
        <h2>3D Cubic Bézier Curve</h2>
        <p>3차원 공간에서 4개의 제어점을 기반으로 부드러운 곡선을 그리는 <span class="highlight">베지에 곡선(Bézier Curve)</span> 알고리즘 시뮬레이터입니다.</p>
        <div class="control-guide">
            <strong>🖱️ 화면 조작 방법:</strong>
            <ul>
                <li><span class="highlight">드래그:</span> 3D 시점 회전</li>
                <li><span class="highlight">휠(Scroll):</span> 확대 및 축소</li>
                <li><span class="highlight">우클릭 드래그:</span> 카메라 평면 이동</li>
            </ul>
        </div>
    </div>

    <script>
        // 1. 3D 렌더링 환경 설정 (Scene, Camera, Renderer)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0f19); // 딥 다크 배경색

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 8, 12); // 초기 카메라 위치 조절

        const renderer = new THREE.WebGLRenderer({ antialias: true }); // 계단현상 방지
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 마우스로 화면 회전/확대 축소를 가능하게 만드는 컨트롤러
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 부드러운 감속 효과 적용
        controls.dampingFactor = 0.05;

        // 2. 바닥 격자(Grid) 및 3D 축(Axes) 추가
        const gridHelper = new THREE.GridHelper(20, 20, 0x475569, 0x1e293b);
        scene.add(gridHelper);
        
        const axesHelper = new THREE.AxesHelper(5); // 빨강: X, 초록: Y, 파랑: Z
        scene.add(axesHelper);

        // 3. 4개의 3D 제어점 정의 (X, Y, Z 좌표축 설정)
        const p0 = new THREE.Vector3(-5, 1, -3); // 시작점 (Red)
        const p1 = new THREE.Vector3(-2, 7,  4); // 제어점 1 (Yellow)
        const p2 = new THREE.Vector3( 3, -3, 5); // 제어점 2 (Yellow)
        const p3 = new THREE.Vector3( 5, 3, -2); // 끝점 (Red)

        const points = [p0, p1, p2, p3];

        // 제어점 구형(Sphere) 오브젝트로 만들어 공간에 배치
        points.forEach((p, idx) => {
            const geo = new THREE.SphereGeometry(0.22, 32, 32);
            // 시작점과 끝점은 빨간색 계열, 중간 제어점은 노란색 계열
            const mat = new THREE.MeshBasicMaterial({ color: idx === 0 || idx === 3 ? 0xf43f5e : 0xfbbf24 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(p);
            scene.add(mesh);
        });

        // 제어점들 사이를 가로지르는 가이드 점선 그리기
        const lineMat = new THREE.LineBasicMaterial({ color: 0x475569 });
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const controlLine = new THREE.Line(lineGeo, lineMat);
        scene.add(controlLine);

        // 4. 수학 공식을 이용한 3D 베지에 곡선의 매핑 배열 계산
        const curvePoints = [];
        const segments = 120; // 곡선을 얼마나 잘게 쪼개어 부드럽게 표현할 것인가

        for (let i = 0; i <= segments; i++) {
            const t = i / segments; // 0.0 에서 1.0 까지 순차 증가
            
            // 3차 베지에 매개변수 방정식 (X, Y, Z축 동시 연산)
            const x = Math.pow(1-t, 3)*p0.x + 3*Math.pow(1-t, 2)*t*p1.x + 3*(1-t)*Math.pow(t, 2)*p2.x + Math.pow(t, 3)*p3.x;
            const y = Math.pow(1-t, 3)*p0.y + 3*Math.pow(1-t, 2)*t*p1.y + 3*(1-t)*Math.pow(t, 2)*p2.y + Math.pow(t, 3)*p3.y;
            const z = Math.pow(1-t, 3)*p0.z + 3*Math.pow(1-t, 2)*t*p1.z + 3*(1-t)*Math.pow(t, 2)*p2.z + Math.pow(t, 3)*p3.z;
            
            curvePoints.push(new THREE.Vector3(x, y, z));
        }

        // 5. 계산 완료된 배열 데이터를 바탕으로 실제 푸른빛 베지에 곡선 렌더링
        const curveGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
        const curveMat = new THREE.LineBasicMaterial({ color: 0x38bdf8, linewidth: 3 });
        const bezierCurve = new THREE.Line(curveGeo, curveMat);
        scene.add(bezierCurve);

        // 6. 실시간 렌더링 및 프레임 갱신 루프
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 마우스 움직임 감쇠 갱신
            renderer.render(scene, camera);
        }

        // 브라우저 창 크기가 조절될 때 반응형 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
